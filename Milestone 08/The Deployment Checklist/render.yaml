# LaunchPad — Render Blueprint

databases:
  - name: launchpad-db
    plan: free
    databaseName: launchpad
    user: launchpad

services:
  - type: web
    name: launchpad-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: launchpad-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: launchpad-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: launchpad-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: launchpad-api
          envVarKey: RENDER_EXTERNAL_URL
        # Vite bakes this at build time; App.jsx appends /auth, /products paths
