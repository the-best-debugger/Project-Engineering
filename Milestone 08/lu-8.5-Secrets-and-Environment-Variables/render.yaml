# render.yaml — Render Blueprint for NoteVault

databases:
  - name: notevault-db
    plan: free
    databaseName: notevault
    user: notevault

services:
  - type: web
    name: notevault-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: notevault-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
