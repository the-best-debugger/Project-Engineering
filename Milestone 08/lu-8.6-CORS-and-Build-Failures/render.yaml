# render.yaml — Render Blueprint for LinkShelf

databases:
  - name: linkshelf-db
    plan: free
    databaseName: linkshelf
    user: linkshelf

services:
  # ---- Backend API ----
  - type: web
    name: linkshelf-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: linkshelf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: linkshelf-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ---- Frontend (Static Site) ----
  - type: web
    name: linkshelf-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: linkshelf-api
          envVarKey: RENDER_EXTERNAL_URL
